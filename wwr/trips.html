    <meta name="description"
      content="Detailed Information about trips available at Rapids Whitewater Rafting and available equipment">
    <meta name="author" content="Luke Ina">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/whitewater-rafting-logo.jpg" alt="Whitewater Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="trip_details title">
            <h1>Trip Details</h1>
            <figure>
                <img src="images/equipment.jpg" alt="Equipment Provided">
                <p>Proper equipment will be provided, such as lifejackets, rafts, and paddles</p>
            </figure>
            <figure>
                <img src="images/leader.jpg" alt="Leader Guidance">
                <p>One of our staff will always join you during your trips acting as the leader and
                    guide
                </p>
            </figure>
            <figure>
                <img src="images/time.jpg" alt="Going Down the River">
                <p>Trips usually take around 30 - 90 minutes</p>
            </figure>
        </section>
        </section>
        <h2>Available Trips</h2>
        <section class="trips">
            <div class="popular">
                <figure>
                    <h3>*Most Popular*</h3>
                    <img src="images/tsunami_crash_ride.jpg" alt="Tsunami Crash ride">
                    <h3>Tsunami Crash</h3>
                    <p>TSUNAMI CRASH IS NOT FOR THE FAINT IN HEART! This trip is full of crashing
                        waves
                        and you will most
                        likely fall off your raft. Be ready to fight for your life as you go down
                        our
                        most intense trip that
                        we can offer.</p>
                </figure>
            </div>
            <figure>
                <img src="images/calming-waves-ride.jpg" alt="Calming Waves ride">
                <h3>Calming Waves</h3>
                <p>For those who are looking for a more relaxing experience, the Calming Waves trip
                    is what you are
                    looking for. Ride down peacefully through the river and breathe in the fresh air
                    as you listen to
                    birds chirping in the forest around you.</p>
            </figure>
            <figure>
                <img src="images/deep-in-the-jungle.jpg" alt="Deep in the Jungle ride">
                <h3>Deep in the Jungle</h3>
                <p>The Deep in the Jungle trip is for those who want to experience the beautiful
                    nature near the Rapid
                    Whitewater Rafting Location while enjoying riding down on the river. If you are
                    a nature-lover, this
                    one is for you.</p>
            </figure>
            <figure>
                <img src="images/amazon-adventure.jpg" alt="Amazon Adventure ride">
                <h3>Amazon Adventure</h3>
                <p>Together with your friends, explore through an environment like no other in the
                    Amazon Adventure
                    trip. Go down a fast river, navigate tight turns, and form friendships and
                    memorize as you traverse
                    through the amazon-like forest.</p>
            </figure>
            <figure>
                <img src="images/wild-odyssey.jpg" alt="Wild Odyssey ride">
                <h3>Wild Odyssey</h3>
                <p>Want a more thrilling experience of water rafting, the Wild Odyssey trip offers
                    just that. Ride down
                    the fastest river our company has to offer. If you want to experience true water
                    rafting, this trip
                    is the right one for you.</p>
            </figure>
        </section>

    </main>
