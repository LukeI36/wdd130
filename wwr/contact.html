<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Rapids Whitewater Rafting</title>
    <meta name="description"
      content="Location of Rapids Whitewater Rafting with multiple get in contact methods like email, phone number, and personal message">
    <meta name="author" content="Luke Ina">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/whitewater-rafting-logo.jpg" alt="Whitewater Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section class="contact-info">
            <h1>Rapids Whitewater Rafting</h1>
            <p>1 Arthurs Point Road, Arthurs Point, Queenstown 9371</p>
            <p>New Zealand</p>
            <p>+64 944-839-2837</p>
            <p>info@rwrafting.com</p>
        </section>
        <section class="map-and-form">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d16912.691582091888!2d168.6858876619195!3d-44.98498383983699!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xa9d51cf633466b9d%3A0xcf7e61eccbde7cf0!2s1%20Arthurs%20Point%20Road%2C%20Arthurs%20Point%2C%20Queenstown%209371%2C%20New%20Zealand!5e0!3m2!1sen!2sca!4v1775158660799!5m2!1sen!2sca"
              width="450" height="500" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <form>
                <div class="column-input">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="column-input">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email">
                </div>
                <div class="message-purpose">
                    <p>Message Purpose</p>

                    <section class="option">
                        <input type="radio" id="general-inquiry" name="message-purpose">
                        <label for="general-inquiry">General Inquiry</label><br>
                    </section>
                    <section class="option">
                        <input type="radio" id="reservation-question" name="message-purpose">
                        <label for="reservation-question">Reservation Question</label><br>
                    </section>
                    <section class="option">
                        <input type="radio" id="website-suggestions" name="message-purpose">
                        <label for="website-suggestions">Website Suggestion</label><br>
                    </section>
                </div>

                <label for="message">Message</label>
                <textarea name="message" id="message" rows="4"></textarea>

                <div class="checkbox">
                    <input type="checkbox" id="monthly-newsletter" name="monthly-newsletter">
                    <label for="monthly-newsletter">Please Subscribe me to the monthly
                        newsletter</label>
                </div>

                <button type="submit">Submit Message</button>
            </form>
        </section>
        <section class="employers">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/employee-man-1.jpg" alt="Ben Wright Profile Picture">
                <figcaption>Ben Wright</figcaption>
            </figure>
            <figure>
                <img src="images/employee-woman-1.jpg" alt="Kali Stone Profile Picture">
                <figcaption>Kali Stone</figcaption>
            </figure>
            <figure>
                <img src="images/employee-woman-2.jpg" alt="Emma Green Profile Picture">
                <figcaption>Emma Green</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2026 | Rapids Whitewater Rafting | Luke Ina</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/"><img src="images/facebook-logo.png"
                  alt="Facebook Logo"></a>
            <a href="https://www.instagram.com/"><img src="images/instagram-logo.png"
                  alt="Instagram Logo"></a>
            <a href="https://www.youtube.com/"><img src="images/youtube-logo.png"
                  alt="YouTube Logo"></a>
        </nav>
    </footer>
</body>

</html>
